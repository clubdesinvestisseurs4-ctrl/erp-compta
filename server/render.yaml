services:
  - type: web
    name: erp-compta-api
    env: node
    region: frankfurt
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000
      # Remplir manuellement dans le dashboard Render :
      # - key: FIREBASE_PROJECT_ID
      # - key: FIREBASE_CLIENT_EMAIL
      # - key: FIREBASE_PRIVATE_KEY
      # - key: CLIENT_URL
